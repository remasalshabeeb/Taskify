    <title>Contact Us</title>
</head>
<body>

     <nav class="navbar navbar-expand-lg custom-nav shadow-sm bg-white sticky-top">
  <div class="container-fluid">
    <a class="nav-logo anim-logo" href="index.html">
      <img src="../Elements/logo Taskify.png" alt="Taskify Logo" height="55" width="auto">
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-3">
        <li class="nav-item">
          <a class="nav-link active fw-bold text-primary" href="index.html">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link fw-bold text-primary" href="tasks.html">Tasks</a>
        </li>
        <li class="nav-item">
          <a class="nav-link fw-bold text-primary" href="table.html">Table</a>
        </li>

          <a class="nav-link fw-bold text-primary" href="about.html">About</a>

      </ul>

      <div class="d-flex">
        <a href="#" class="btn btn-primary rounded-pill px-4 shadow-sm">Get Started</a>
      </div>

  </div>

<div class="container py-5">
    <div class="contact-header mb-5">
        <h1 class="fw-bold">Contact Us</h1>
        <p class="text-muted">We'd love to hear from you!</p>
    </div>

    <div class="row align-items-center g-5">
        <div class="col-lg-7">
            <div class="contact-form-card p-4 shadow-sm border rounded-4 bg-white">
                <form>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <input type="text" class="form-control custom-input" placeholder="Your Name">
                        </div>
                        <div class="col-md-6">
                            <input type="email" class="form-control custom-input" placeholder="Your Email">
                        </div>
                        <div class="col-12">
                            <input type="text" class="form-control custom-input" placeholder="Subject">
                        </div>
                        <div class="col-12">
                            <textarea class="form-control custom-input" rows="5" placeholder="Your Message"></textarea>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary px-4 py-2 rounded-3 d-flex align-items-center">
                                Send Message <i class="bi bi-send-fill ms-2"></i>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="col-lg-5 text-center">
            <div class="illustration-container">
                <img src="../Elements/contact.png" alt="Contact Illustration" class="img-fluid">
            </div>
        </div>
    </div>
</div>


</body>
</html>
