<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/index.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>About Us</title>
</head>
<body>
  
    <div class="container py-5">
    <div class="about-header mb-5">
        <h1 class="fw-bold">About Us</h1>
        <p class="text-muted">Learn more about our mission and goals.</p>
    </div>

    <div class="row align-items-center mb-5 g-5">
        <div class="col-md-6">
            <div class="about-img-container text-center">
                <img src="../Elements/about us.png" alt="Our Mission" class="img-fluid">
            </div>
        </div>
        <div class="col-md-6">
            <h3 class="fw-bold mb-3">Our Mission</h3>
            <p class="text-secondary leading-relaxed">
                Our mission is to help people organize their tasks, manage their time effectively, and achieve more every day. 
                We believe that productivity should be simple and beautiful.
            </p>
        </div>
    </div>

    <div class="why-taskmanager mt-5">
        <h4 class="fw-bold mb-4">Why Taskife?</h4>
        <ul class="list-unstyled">
    <li class="mb-3 d-flex align-items-center">
        <input class="form-check-input custom-check me-3" type="checkbox" id="task1" checked>
        <label class="form-check-label fs-5 text-secondary" for="task1">Easy to use</label>
    </li>
    <li class="mb-3 d-flex align-items-center">
        <input class="form-check-input custom-check me-3" type="checkbox" id="task2">
        <label class="form-check-label fs-5 text-secondary" for="task2">Beautiful and modern design</label>
    </li>
    <li class="mb-3 d-flex align-items-center">
        <input class="form-check-input custom-check me-3" type="checkbox" id="task3">
        <label class="form-check-label fs-5 text-secondary" for="task3">Keeps you focused and productive</label>
    </li>
    <li class="mb-3 d-flex align-items-center">
        <input class="form-check-input custom-check me-3" type="checkbox" id="task4">
        <label class="form-check-label fs-5 text-secondary" for="task4">Access your tasks anywhere</label>
    </li>
        </ul>
    </div>
</div>


</body>
</html>
