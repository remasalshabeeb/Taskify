</head>
<body>
    <nav class="navbar navbar-expand-lg custom-nav shadow-sm bg-white sticky-top">
  <div class="container-fluid">
    <a class="nav-logo anim-logo" href="index.html">
      <img src="../Elements/logo Taskify.png" alt="Taskify Logo" height="55" width="auto">
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-3">
        <li class="nav-item">
          <a class="nav-link active fw-bold text-primary" href="index.html">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link fw-bold text-primary" href="tasks.html">Tasks</a>
        </li>
        <li class="nav-item">
          <a class="nav-link fw-bold text-primary" href="table.html">Table</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active fw-bold text-primary" href="calendar.html">Calendar</a>
        </li>
        <li class="nav-item">
          <a class="nav-link fw-bold text-primary" href="about.html">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link fw-bold text-primary" href="contact.html">Contact</a>
        </li>
      </ul>

       <div class="d-flex align-items-center">
        <button id="darkModeToggle" class="btn btn-outline-secondary rounded-circle me-3 border-0 p-1">
            <img id="themeIconImg" src="../Elements/bulb.png" alt="Toggle Theme" height="30" width="30">
        </button>
        <a href="#" class="btn btn-primary rounded-pill px-4 shadow-sm">Get Started</a>
      </div>
    </div>
  </div>
</nav>


<div class="container py-5">
    <div class="card shadow-sm border-0 rounded-4 p-4 bg-white">
      
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <div class="btn-group" role="group">
            <button class="btn btn-outline-primary view-btn active" data-view="month">Month</button>
            <button class="btn btn-outline-primary view-btn" data-view="week">Week</button>
            <button class="btn btn-outline-primary view-btn" data-view="day">Day</button>
          </div>
        </div>
        <h3 class="fw-bold m-0 text-dark" id="calendarTitle">April 2026</h3>
        <div>
          <button id="prevMonthBtn" class="btn btn-sm btn-light border rounded-circle me-1">&lt;</button>
          <button id="todayBtn" class="btn btn-sm btn-primary rounded-pill px-3 me-1">Today</button>
          <button id="nextMonthBtn" class="btn btn-sm btn-light border rounded-circle">&gt;</button>
        </div>
      </div>

      <div id="monthViewWrapper">
        <div class="calendar-weekdays-header text-center fw-bold text-muted border-bottom pb-2 mb-2">
          <div>Sun</div>
          <div>Mon</div>
          <div>Tue</div>
          <div>Wed</div>
          <div>Thu</div>
          <div>Fri</div>
          <div>Sat</div>
        </div>
        
        <div id="calendarDaysGrid"></div>
      </div>

      <div id="otherViewsWrapper" class="d-none text-center py-5 text-muted">
        <h5 id="viewMessage">Displaying View...</h5>
      </div>

    </div>
  </div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="../JS/Theme.JS"></script>
<script src="../JS/Calendar.JS"></script>
</body>
</html>
