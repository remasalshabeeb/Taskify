     <div class="container py-5">
    <h2 class="fw-bold mb-1">My Tasks</h2>
    <p class="text-muted mb-4">Add and manage your daily tasks.</p>

    <div class="row g-2 mb-4">
        <div class="col-md-5">
            <input type="text" id="taskNameInput" class="form-control" placeholder="Enter task name...">
        </div>
        <div class="col-md-3">
            <input type="date" id="taskDateInput" class="form-control">
        </div>
        <div class="col-md-2">
            <select id="taskPriorityInput" class="form-control">
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
            </select>
        </div>
        <div class="col-md-2">
            <button onclick="createNewTask()" class="btn btn-primary w-100">Add Task</button>
        </div>
    </div>

    <div class="card shadow-sm border-0 rounded-3">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Task Name</th>
                        <th>Date</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tasksTableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
